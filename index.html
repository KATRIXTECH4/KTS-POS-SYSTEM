<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KTS POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#16213A;
    --ink-soft:#1F2C4A;
    --ink-line:#2C3A5C;
    --paper:#F6F2E9;
    --card:#FFFFFF;
    --green:#1F7A5C;
    --green-dark:#155F46;
    --green-tint:#E4F1EC;
    --gold:#C89B3C;
    --gold-tint:#F7EDD6;
    --red:#B4432F;
    --red-tint:#F9E7E2;
    --text:#241F1B;
    --text-muted:#736B5E;
    --border:#E5DFCF;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .disp{font-family:'Space Grotesk',sans-serif;}
  ::selection{background:var(--gold-tint);}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(200,155,60,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(31,122,92,0.12), transparent 45%),
      var(--ink);
    padding:24px;
  }
  .login-card{
    width:100%;
    max-width:400px;
    background:var(--paper);
    border-radius:4px;
    padding:40px 36px 32px;
    position:relative;
    box-shadow:0 30px 60px rgba(0,0,0,0.35);
  }
  .login-card::before{
    content:"";
    position:absolute;
    top:0;left:24px;right:24px;height:3px;
    background:repeating-linear-gradient(90deg,var(--gold) 0 10px, transparent 10px 16px);
  }
  .login-brand{
    display:flex;align-items:center;gap:10px;margin-bottom:6px;
  }
  .login-brand .mark{
    width:34px;height:34px;border-radius:8px;background:var(--ink);
    display:flex;align-items:center;justify-content:center;color:var(--gold);
    flex-shrink:0;
  }
  .login-brand h1{font-size:20px;margin:0;letter-spacing:-0.02em;}
  .login-sub{color:var(--text-muted);font-size:13px;margin:0 0 28px;}
  .role-toggle{
    display:flex;background:#EDE7D8;border-radius:999px;padding:4px;margin-bottom:22px;
  }
  .role-toggle button{
    flex:1;border:none;background:transparent;padding:9px 0;border-radius:999px;
    font-size:13px;font-weight:600;color:var(--text-muted);transition:all .15s ease;
  }
  .role-toggle button.active{background:var(--ink);color:#fff;}
  .field{margin-bottom:16px;}
  .field label{
    display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text-muted);margin-bottom:6px;
  }
  .field input{
    width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:6px;
    background:#fff;font-size:14px;color:var(--text);outline:none;
  }
  .field input:focus{border-color:var(--ink);}
  .login-btn{
    width:100%;padding:12px 0;border:none;border-radius:6px;background:var(--green);
    color:#fff;font-weight:600;font-size:14px;letter-spacing:.02em;margin-top:6px;
    transition:background .15s ease;
  }
  .login-btn:hover{background:var(--green-dark);}
  .login-error{
    background:var(--red-tint);color:var(--red);font-size:12.5px;padding:9px 12px;
    border-radius:6px;margin-bottom:14px;
  }
  .login-hint{
    margin-top:22px;padding-top:16px;border-top:1px dashed var(--border);
    font-size:11.5px;color:var(--text-muted);line-height:1.6;
  }
  .login-hint b{color:var(--text);}

  /* ---------- APP SHELL ---------- */
  .app{display:flex;min-height:100vh;}
  .sidebar{
    width:222px;flex-shrink:0;background:var(--ink);color:#EDEBE3;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .sidebar-brand{
    display:flex;align-items:center;gap:10px;padding:22px 20px 18px;
    border-bottom:1px solid var(--ink-line);
  }
  .sidebar-brand .mark{
    width:32px;height:32px;border-radius:8px;background:var(--gold);
    display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;
  }
  .sidebar-brand span{font-size:16px;font-weight:600;letter-spacing:-0.02em;}
  .nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1;}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;
    color:#B9C0D4;border-radius:7px;font-size:13.5px;font-weight:500;text-align:left;
    transition:all .12s ease;
  }
  .nav-item:hover{background:var(--ink-soft);color:#fff;}
  .nav-item.active{background:var(--green);color:#fff;}
  .nav-item svg{flex-shrink:0;}
  .sidebar-foot{padding:14px 12px 18px;border-top:1px solid var(--ink-line);}
  .user-chip{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;margin-bottom:6px;
  }
  .user-chip .avatar{
    width:30px;height:30px;border-radius:50%;background:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
    color:var(--gold);flex-shrink:0;
  }
  .user-chip .who{overflow:hidden;}
  .user-chip .who .name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-chip .who .role{font-size:10.5px;color:#8891A8;text-transform:uppercase;letter-spacing:.05em;}
  .user-chip .who .login-time{font-size:10px;color:#6E7690;margin-top:2px;white-space:nowrap;}
  .logout-btn{
    width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border:none;
    background:transparent;color:#B9C0D4;border-radius:7px;font-size:13px;font-weight:500;
  }
  .logout-btn:hover{background:var(--red);color:#fff;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 32px;border-bottom:1px solid var(--border);background:var(--paper);
    position:sticky;top:0;z-index:5;
  }
  .topbar h2{margin:0;font-size:20px;letter-spacing:-0.02em;}
  .topbar .sub{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
  .topbar .right{display:flex;align-items:center;gap:14px;}
  .badge{
    font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:4px 9px;border-radius:999px;
  }
  .badge.admin{background:var(--gold-tint);color:#8A6A1F;}
  .badge.sales{background:var(--green-tint);color:var(--green-dark);}
  .content{padding:28px 32px 60px;flex:1;}

  /* ---------- CARDS / GENERIC ---------- */
  .dash-brand{display:flex;align-items:center;gap:9px;margin-bottom:18px;color:var(--text-muted);}
  .dash-brand svg{color:var(--gold);}
  .dash-brand span{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
  .grid{display:grid;gap:16px;}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:24px;}
  .stat-card{
    background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;
    position:relative;overflow:hidden;
  }
  .stat-card .label{font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .stat-card .value{font-size:26px;font-weight:700;margin-top:8px;letter-spacing:-0.01em;}
  .stat-card .foot{font-size:11.5px;color:var(--text-muted);margin-top:6px;}
  .stat-card.accent-green{border-left:3px solid var(--green);}
  .stat-card.accent-gold{border-left:3px solid var(--gold);}
  .stat-card.accent-red{border-left:3px solid var(--red);}
  .stat-card.accent-ink{border-left:3px solid var(--ink);}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
    border-bottom:1px solid var(--border);
  }
  .panel-head h3{margin:0;font-size:14.5px;font-weight:700;}
  .panel-body{padding:18px 20px;}

  table{width:100%;border-collapse:collapse;}
  th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--text-muted);font-weight:700;padding:0 20px 10px;border-bottom:1px solid var(--border);
  }
  td{padding:12px 20px;border-bottom:1px solid #F0ECDF;font-size:13.5px;}
  tr:last-child td{border-bottom:none;}
  .num{font-family:'IBM Plex Mono',monospace;}
  .low-stock-row{background:var(--red-tint);}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .pill.low{background:var(--red);color:#fff;}
  .pill.ok{background:var(--green-tint);color:var(--green-dark);}

  .btn{
    border:none;border-radius:6px;padding:9px 14px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:all .12s ease;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{background:var(--ink-soft);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:var(--green-dark);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{background:#F0ECDF;}
  .btn-danger-ghost{background:transparent;color:var(--red);border:1px solid var(--red-tint);}
  .btn-danger-ghost:hover{background:var(--red-tint);}
  .icon-btn{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:#fff;
    display:inline-flex;align-items:center;justify-content:center;color:var(--text-muted);
  }
  .icon-btn:hover{background:#F0ECDF;color:var(--text);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* ---------- PRODUCTS PAGE ---------- */
  .search-bar{
    display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);
    border-radius:7px;padding:8px 12px;max-width:280px;
  }
  .search-bar input{border:none;outline:none;font-size:13px;flex:1;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,33,58,0.55);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:#fff;border-radius:10px;width:100%;max-width:420px;padding:26px 26px 22px;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
  }
  .modal h3{margin:0 0 4px;font-size:17px;}
  .modal .modal-sub{font-size:12.5px;color:var(--text-muted);margin:0 0 20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  /* ---------- SALES / POS PAGE ---------- */
  .pos-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
  .product-tile{
    background:#fff;border:1px solid var(--border);border-radius:9px;padding:14px;text-align:left;
    display:flex;flex-direction:column;gap:8px;transition:all .12s ease;
  }
  .product-tile:hover:not(:disabled){border-color:var(--green);transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,0.06);}
  .product-tile:disabled{opacity:.45;cursor:not-allowed;}
  .product-tile .pname{font-weight:600;font-size:13.5px;line-height:1.3;}
  .product-tile .pcat{font-size:11px;color:var(--text-muted);}
  .product-tile .prow{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
  .product-tile .pprice{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;}
  .product-tile .pstock{font-size:10.5px;color:var(--text-muted);}
  .tiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}

  .receipt{
    background:#fff;border:1px solid var(--border);border-radius:10px;position:sticky;top:90px;
    display:flex;flex-direction:column;max-height:calc(100vh - 120px);
  }
  .receipt-head{padding:18px 20px 14px;border-bottom:1px dashed var(--border);}
  .receipt-head .store{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;}
  .receipt-head .meta{font-size:11px;color:var(--text-muted);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
  .receipt-items{padding:12px 20px;overflow-y:auto;flex:1;}
  .receipt-line{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px dotted #E9E4D5;gap:8px;}
  .receipt-line:last-child{border-bottom:none;}
  .receipt-line .li-name{font-size:12.5px;font-weight:600;}
  .receipt-line .li-sub{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .qty-ctrl{display:flex;align-items:center;gap:6px;}
  .qty-ctrl button{
    width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:#fff;
    font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .qty-ctrl span{font-family:'IBM Plex Mono',monospace;font-size:12px;min-width:16px;text-align:center;}
  .li-remove{color:var(--red);background:none;border:none;font-size:11px;margin-top:4px;text-decoration:underline;}
  .receipt-empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:12.5px;}
  .receipt-totals{padding:14px 20px;border-top:1px dashed var(--border);font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .receipt-totals .row{display:flex;justify-content:space-between;padding:3px 0;}
  .receipt-totals .row.grand{font-size:16px;font-weight:700;font-family:'Space Grotesk',sans-serif;padding-top:8px;margin-top:4px;border-top:1px solid var(--border);}
  .receipt-foot{padding:16px 20px 20px;}
  .checkout-btn{width:100%;padding:13px 0;border:none;border-radius:7px;background:var(--green);color:#fff;font-weight:700;font-size:14px;}
  .checkout-btn:hover:not(:disabled){background:var(--green-dark);}
  .checkout-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* ---------- M-PESA PAYMENT UI ---------- */
  .pay-toggle{display:flex;gap:8px;padding:0 20px 14px;}
  .pay-toggle button{
    flex:1;padding:9px 0;border-radius:7px;border:1px solid var(--border);
    background:#fff;color:var(--text-muted);font-weight:600;font-size:12.5px;
  }
  .pay-toggle button.active{border-color:var(--green);color:var(--green);background:var(--green-tint);}
  .mpesa-box{margin:0 20px 14px;padding:14px;border:1px solid var(--border);border-radius:9px;background:#fff;}
  .mpesa-box label{display:block;font-size:11.5px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  .mpesa-box input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;
    font-size:14px;color:var(--text);outline:none;margin-bottom:10px;
  }
  .mpesa-waiting{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-muted);padding:4px 0 10px;}
  .mpesa-spinner{
    width:16px;height:16px;border-radius:50%;flex-shrink:0;
    border:2px solid var(--gold-tint);border-top-color:var(--gold);
    animation:mpspin .8s linear infinite;
  }
  @keyframes mpspin{to{transform:rotate(360deg);}}
  .mpesa-cancel{width:100%;padding:9px 0;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text-muted);font-size:12.5px;font-weight:600;}
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.3);
    z-index:80;display:flex;align-items:center;gap:8px;
  }

  /* ---------- REPORTS ---------- */
  .bars{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 4px 0;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .bar-col .bar{width:100%;max-width:38px;background:var(--green);border-radius:5px 5px 0 0;transition:height .25s ease;}
  .bar-col .bar.is-profit{background:var(--gold);}
  .bar-col .blabel{font-size:10px;color:var(--text-muted);margin-top:4px;}
  .legend{display:flex;gap:16px;font-size:11.5px;color:var(--text-muted);margin-bottom:6px;}
  .legend .dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;}

  .empty-state{padding:50px 20px;text-align:center;color:var(--text-muted);}
  .empty-state svg{margin-bottom:10px;opacity:.5;}
  .empty-state p{font-size:13px;margin:0;}

  /* ---------- SETTINGS ---------- */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:1050px){.settings-grid{grid-template-columns:1fr;} .pos-layout{grid-template-columns:1fr;} .receipt{position:relative;top:0;max-height:none;}}
  .field-inline{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .field-inline label{font-size:11.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
  .field-inline input,.field-inline select{padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;}
  .staff-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0ECDF;}
  .staff-row:last-child{border-bottom:none;}
  .staff-row .name{font-size:13.5px;font-weight:600;}
  .staff-row .uname{font-size:11.5px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}

  /* ---------- DASHBOARD 2-COL (was inline style) ---------- */
  .dash-cols{grid-template-columns:1.4fr 1fr;}

  /* ---------- TABLE SCROLL WRAPPER (prevents page from breaking on narrow screens) ---------- */
  .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .table-scroll table{width:auto;min-width:100%;}
  @media (max-width:768px){
    .table-scroll th, .table-scroll td{white-space:nowrap;}
  }

  /* ---------- MOBILE MENU BUTTON (hidden on desktop) ---------- */
  .menu-btn{
    display:none;width:36px;height:36px;border-radius:7px;border:1px solid var(--border);
    background:#fff;color:var(--text);align-items:center;justify-content:center;flex-shrink:0;
  }
  .sidebar-backdrop{display:none;}

  /* =========================================================
     MOBILE / PHONE PORTRAIT LAYOUT
     Sidebar becomes an off-canvas drawer, spacing tightens,
     and multi-column layouts stack to a single column so the
     app is fully usable without rotating the phone.
     ========================================================= */
  @media (max-width: 768px){
    .app{display:block;}

    .menu-btn{display:inline-flex;}

    .sidebar{
      position:fixed;top:0;left:0;height:100%;width:240px;max-width:80vw;
      z-index:70;transform:translateX(-100%);transition:transform .25s ease;
      box-shadow:0 0 40px rgba(0,0,0,.45);
    }
    .sidebar.open{transform:translateX(0);}

    .sidebar-backdrop{
      display:block;position:fixed;inset:0;background:rgba(15,20,35,.5);
      z-index:65;opacity:0;pointer-events:none;transition:opacity .2s ease;
    }
    .sidebar-backdrop.open{opacity:1;pointer-events:auto;}

    .main{width:100%;}

    .topbar{padding:14px 16px;gap:10px;}
    .topbar h2{font-size:17px;}
    .topbar .sub{font-size:11px;}
    .topbar .right{gap:8px;flex-wrap:wrap;justify-content:flex-end;}
    .topbar .right span:not(.badge){display:none;} /* hide store name chip, keep it tidy */

    .content{padding:16px 14px 48px;}

    .dash-brand span{font-size:16px;}
    .stat-row{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
    .stat-card{padding:14px 14px;}
    .stat-card .value{font-size:21px;}

    .dash-cols{grid-template-columns:1fr !important;}

    .panel-head{padding:14px 16px;}
    .panel-body{padding:14px 16px;}
    th,td{padding:10px 12px;font-size:12.5px;}

    .toolbar{flex-direction:column;align-items:stretch;}
    .search-bar{max-width:none;}

  const d = new Date(ts);
  const day = d.getDay(); // 0 = Sun ... 6 = Sat
  const diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
};

/* ---------------- LOGIN PAGE ---------------- */
function LoginPage({onLogin}){
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (busy) return;
    setError("");
    if (!username.trim() || !password){ setError("Enter your username and password."); return; }
    setBusy(true);
    const {data, error: err} = await sb.rpc("login", {p_username: username.trim(), p_password: password});
    setBusy(false);
    if (err || !data || !data.length){
      setError(err ? err.message.replace(/^.*: /, "") : "Invalid username or password.");
      return;
    }
    onLogin(data[0]);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="mark"><Icon name="store" size={18}/></div>
          <h1 className="disp">KTS POS</h1>
        </div>
        <p className="login-sub">Sign in to open the till.</p>

        {error && <div className="login-error">{error}</div>}

        <form onSubmit={submit}>
          <div className="field">
            <label>Username</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Your username" autoFocus/>
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/>
          </div>
          <button className="login-btn" type="submit" disabled={busy}>{busy ? "Signing in…" : "Log in"}</button>
        </form>

        <div className="login-hint">
          Don't have an account? Ask your store admin to create one for you under <b>Settings → Staff accounts</b>.
        </div>
      </div>
    </div>
  );
}

/* ---------------- FIRST-RUN SETUP PAGE ---------------- */
function SetupPage({onSetupComplete}){
  const [form, setForm] = useState({name:"", username:"", password:"", confirm:""});
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const set = (k,v) => setForm(f=>({...f, [k]:v}));

  const submit = async (e) => {
    e.preventDefault();
    if (busy) return;
    setError("");
    if (!form.name.trim() || !form.username.trim() || !form.password){ setError("Fill in every field."); return; }
    if (form.password.length < 6){ setError("Password must be at least 6 characters."); return; }
    if (form.password !== form.confirm){ setError("Passwords don't match."); return; }
    setBusy(true);
    const {data, error: err} = await sb.rpc("bootstrap_admin", {
      p_username: form.username.trim(), p_password: form.password, p_full_name: form.name.trim(),
    });
    setBusy(false);
    if (err || !data || !data.length){
      setError(err ? err.message.replace(/^.*: /, "") : "Couldn't create the account.");
      return;
    }
    onSetupComplete(data[0]);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="mark"><Icon name="store" size={18}/></div>
          <h1 className="disp">KTS POS</h1>
        </div>
        <p className="login-sub">Welcome — let's set up your admin account.</p>

        {error && <div className="login-error">{error}</div>}

        <form onSubmit={submit}>
          <div className="field">
            <label>Your full name</label>
            <input value={form.name} onChange={e=>set("name", e.target.value)} placeholder="e.g. Grace Kiptoo" autoFocus/>
          </div>
          <div className="field">
            <label>Choose a username</label>
            <input value={form.username} onChange={e=>set("username", e.target.value)} placeholder="e.g. grace"/>
          </div>
          <div className="field">
            <label>Choose a password</label>
            <input type="password" value={form.password} onChange={e=>set("password", e.target.value)} placeholder="At least 6 characters"/>
          </div>
          <div className="field">
            <label>Confirm password</label>
            <input type="password" value={form.confirm} onChange={e=>set("confirm", e.target.value)} placeholder="••••••••"/>
          </div>
          <button className="login-btn" type="submit" disabled={busy}>{busy ? "Creating account…" : "Create admin account"}</button>
        </form>

        <div className="login-hint">
          This account has full access. Once you're in, you can create sales-person accounts for your staff under <b>Settings → Staff accounts</b>.
        </div>
      </div>
    </div>
  );
}

/* ---------------- SIDEBAR ---------------- */

/* ---------------- DASHBOARD ---------------- */
function Dashboard({products, sales, user, lowStockThreshold, storeName}){
  const todaySales = sales.filter(s => todayKey(s.timestamp) === todayKey(Date.now()));
  const revenue = todaySales.reduce((a,s)=>a+s.total,0);
  const profit = todaySales.reduce((a,s)=>a+s.profit,0);
  const txCount = todaySales.length;
  const lowStock = products.filter(p => p.stock <= lowStockThreshold);
  const isAdmin = user.role === "admin";

  const salesByProduct = {};
  todaySales.forEach(s => s.items.forEach(it => {
    salesByProduct[it.name] = (salesByProduct[it.name]||0) + it.qty;
  }));
  const topProduct = Object.entries(salesByProduct).sort((a,b)=>b[1]-a[1])[0];

  return (
    <div>
      <div className="dash-brand">
        <Icon name="store" size={20}/>
        <span>{storeName}</span>
      </div>
      <div className="grid stat-row">
        <div className="stat-card accent-green">
          <div className="label">Today's revenue</div>
          <div className="value mono">{fmt(revenue)}</div>
          <div className="foot">{txCount} transaction{txCount!==1?"s":""}</div>
        </div>
        {isAdmin && (
          <div className="stat-card accent-gold">
            <div className="label">Today's profit</div>
            <div className="value mono">{fmt(profit)}</div>
            <div className="foot">{revenue>0 ? Math.round(profit/revenue*100)+"% margin" : "No sales yet"}</div>
          </div>
        )}
        <div className="stat-card accent-ink">
          <div className="label">Items in catalog</div>
          <div className="value">{products.length}</div>
          <div className="foot">{products.reduce((a,p)=>a+p.stock,0)} units in stock</div>
        </div>
        <div className="stat-card accent-red">
          <div className="label">Low stock alerts</div>
          <div className="value">{lowStock.length}</div>
          <div className="foot">At or below {lowStockThreshold} units</div>
        </div>
      </div>

      <div className="grid dash-cols">
        <div className="panel">
          <div className="panel-head"><h3>Recent sales today</h3></div>
          <div className="panel-body" style={{padding:0}}>
            {todaySales.length === 0 ? (
              <div className="empty-state"><Icon name="receipt" size={30}/><p>No sales recorded yet today.</p></div>
            ) : (
              <div className="table-scroll">
              <table>
                <thead><tr><th>Time</th><th>Cashier</th><th>Items</th><th>Total</th></tr></thead>
                <tbody>
                  {todaySales.slice().reverse().slice(0,8).map(s => (
                    <tr key={s.id}>
                      <td className="mono">{new Date(s.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                      <td>{s.cashier}</td>
                      <td>{s.items.reduce((a,i)=>a+i.qty,0)} item(s)</td>
                      <td className="num">{fmt(s.total)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
            )}
          </div>
        </div>

        <div className="panel">
          <div className="panel-head"><h3>Needs attention</h3></div>
          <div className="panel-body" style={{padding:0}}>
            {lowStock.length === 0 ? (
              <div className="empty-state"><Icon name="check" size={30}/><p>All products are well stocked.</p></div>
            ) : (
              <div className="table-scroll">
              <table>
                <thead><tr><th>Product</th><th>Stock</th></tr></thead>
                <tbody>
                  {lowStock.map(p => (
                    <tr key={p.id} className="low-stock-row">
                      <td>{p.name}</td>
                      <td><span className="pill low">{p.stock} left</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
            )}
          </div>
        </div>
      </div>

      {topProduct && (
        <div style={{marginTop:16}} className="panel">
          <div className="panel-body" style={{display:"flex", alignItems:"center", gap:12}}>
            <Icon name="trend" size={20}/>
            <span style={{fontSize:13.5}}>Best seller today: <b>{topProduct[0]}</b> — {topProduct[1]} sold</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- PRODUCT MODAL ---------------- */
function ProductModal({initial, onClose, onSave, busy}){
  const [form, setForm] = useState(initial || {name:"", category:"", stock:0, price:0, cost:0});
  const isEdit = !!initial;
  const set = (k,v) => setForm(f=>({...f, [k]:v}));

  const submit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return;
    onSave({...form, stock:Number(form.stock)||0, price:Number(form.price)||0, cost:Number(form.cost)||0});
  };

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div className="modal">
        <h3>{isEdit ? "Edit product" : "Add product"}</h3>
        <p className="modal-sub">{isEdit ? "Update details for this item." : "Add a new item to the catalog."}</p>
        <form onSubmit={submit}>
          <div className="field-inline">
            <label>Product name</label>
            <input required value={form.name} onChange={e=>set("name", e.target.value)} placeholder="e.g. Arabica Coffee Beans 250g"/>
          </div>
          <div className="field-inline">
            <label>Category</label>
            <input value={form.category} onChange={e=>set("category", e.target.value)} placeholder="e.g. Beverages"/>
          </div>
          <div className="form-row">
            <div className="field-inline">
              <label>Stock (units)</label>
              <input type="number" min="0" required value={form.stock} onChange={e=>set("stock", e.target.value)}/>
            </div>
            <div className="field-inline">
              <label>Selling price (KSh)</label>
              <input type="number" min="0" required value={form.price} onChange={e=>set("price", e.target.value)}/>
            </div>
          </div>
          <div className="field-inline">
            <label>Cost price (KSh) — used for profit reports</label>
            <input type="number" min="0" value={form.cost} onChange={e=>set("cost", e.target.value)}/>
          </div>
          <div className="modal-actions">
            <button type="button" className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-green" disabled={busy}><Icon name="check" size={15}/>{busy ? "Saving…" : (isEdit ? "Save changes" : "Add product")}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ---------------- PRODUCTS PAGE ---------------- */
function ProductsPage({products, user, lowStockThreshold, onSaveProduct, onDeleteProduct}){
  const isAdmin = user.role === "admin";
  const [query, setQuery] = useState("");
  const [modal, setModal] = useState(null); // null | "add" | product object
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const filtered = products.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || (p.category||"").toLowerCase().includes(query.toLowerCase()));

  const saveProduct = async (form) => {
    setBusy(true); setErr("");
    const id = modal === "add" ? null : modal.id;
    const {error} = await onSaveProduct(form, id);
    setBusy(false);
    if (error){ setErr(error.message.replace(/^.*: /, "")); return; }
    setModal(null);
  };

  const doDelete = async (id) => {
    setBusy(true);
    await onDeleteProduct(id);
    setBusy(false);
    setConfirmDelete(null);
  };

  return (
    <div>
      <div className="toolbar">
        <div className="search-bar">
          <Icon name="search" size={15}/>
          <input placeholder="Search products or category…" value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
        {isAdmin && (
          <button className="btn btn-primary" onClick={()=>setModal("add")}><Icon name="plus" size={15}/>Add product</button>
        )}
      </div>

      {err && <div className="login-error" style={{marginBottom:14}}>{err}</div>}

      <div className="panel">
        {filtered.length === 0 ? (
          <div className="empty-state"><Icon name="box" size={30}/><p>No products match your search.</p></div>
        ) : (
          <div className="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Product</th><th>Category</th><th>Stock</th><th>Price</th>
                {isAdmin && <th>Cost</th>}
                {isAdmin && <th>Margin</th>}
                {isAdmin && <th></th>}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id} className={p.stock<=lowStockThreshold ? "low-stock-row" : ""}>
                  <td style={{fontWeight:600}}>{p.name}</td>
                  <td>{p.category || "—"}</td>
                  <td>
                    <span className={"pill " + (p.stock<=lowStockThreshold ? "low" : "ok")}>{p.stock} units</span>
                  </td>
                  <td className="num">{fmt(p.price)}</td>
                  {isAdmin && <td className="num">{fmt(p.cost)}</td>}
                  {isAdmin && <td className="num">{p.price>0 ? Math.round((p.price-p.cost)/p.price*100) : 0}%</td>}
                  {isAdmin && (
                    <td>
                      <div style={{display:"flex", gap:6}}>
                        <button className="icon-btn" onClick={()=>setModal(p)}><Icon name="edit" size={14}/></button>
                        <button className="icon-btn" onClick={()=>setConfirmDelete(p)}><Icon name="trash" size={14}/></button>
                      </div>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {!isAdmin && (
        <p style={{fontSize:12, color:"var(--text-muted)", marginTop:12}}>
          Prices and stock levels are managed by an admin. Contact your manager to update the catalog.
        </p>
      )}

      {modal && (
        <ProductModal
          initial={modal === "add" ? null : modal}
          onClose={()=>setModal(null)}
          onSave={saveProduct}
          busy={busy}
        />
      )}

      {confirmDelete && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) setConfirmDelete(null);}}>
          <div className="modal">
            <h3>Delete product?</h3>
            <p className="modal-sub">This will permanently remove <b>{confirmDelete.name}</b> from the catalog. This can't be undone.</p>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button className="btn" style={{background:"var(--red)", color:"#fff"}} disabled={busy} onClick={()=>doDelete(confirmDelete.id)}>
                <Icon name="trash" size={14}/>{busy ? "Deleting…" : "Delete"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- SALES / POS PAGE ---------------- */
function SalesPage({products, sales, user, storeName, onCompleteSale}){
  const [cart, setCart] = useState([]); // {id, name, price, cost, qty}
  const [query, setQuery] = useState("");
  const [toast, setToast] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const [payMethod, setPayMethod] = useState("cash"); // "cash" | "mpesa"
  const [mpesaStage, setMpesaStage] = useState("idle"); // idle | phone | waiting | failed
  const [mpesaPhone, setMpesaPhone] = useState("");
  const [mpesaError, setMpesaError] = useState("");
  const [checkoutRequestId, setCheckoutRequestId] = useState(null);

  useEffect(()=>{
    if (!toast) return;
    const t = setTimeout(()=>setToast(""), 2200);
    return ()=>clearTimeout(t);
  }, [toast]);

  // Poll Supabase for the STK Push result while we're waiting on the customer's phone.
  useEffect(()=>{
    if (mpesaStage !== "waiting" || !checkoutRequestId) return;
    let cancelled = false;
    let elapsed = 0;
    const POLL_MS = 3000;
    const TIMEOUT_MS = 90000;

    const tick = async () => {
      const {data, error} = await sb.rpc("get_payment_status", {p_checkout_request_id: checkoutRequestId});
      if (cancelled) return;
      const row = Array.isArray(data) ? data[0] : data;
      if (!error && row?.status === "success"){
        setMpesaStage("idle");
        setBusy(true);
        const items = cart.map(i => ({product_id: i.id, qty: i.qty}));
        const {error: saleErr} = await onCompleteSale(items);
        setBusy(false);
        if (saleErr){ setErr(saleErr.message.replace(/^.*: /, "")); return; }
        setCart([]);
        setToast("Paid via M-Pesa" + (row.mpesa_receipt ? " — " + row.mpesa_receipt : "") + " · " + fmt(total));
        return;
      }
      if (!error && row?.status === "failed"){
        setMpesaStage("failed");
        setMpesaError(row.result_desc || "Payment was not completed.");
        return;
      }
      elapsed += POLL_MS;
      if (elapsed >= TIMEOUT_MS){
        setMpesaStage("failed");
        setMpesaError("No response from the customer's phone. Ask them to check for the prompt, or try again.");
        return;
      }
      timer = setTimeout(tick, POLL_MS);
    };
    let timer = setTimeout(tick, POLL_MS);
    return () => { cancelled = true; clearTimeout(timer); };
    // eslint-disable-next-line
  }, [mpesaStage, checkoutRequestId]);

  const addToCart = (p) => {
    setCart(c => {
      const existing = c.find(i=>i.id===p.id);
      const inCartQty = existing ? existing.qty : 0;
      if (inCartQty >= p.stock) return c;
      if (existing) return c.map(i=>i.id===p.id ? {...i, qty:i.qty+1} : i);
      return [...c, {id:p.id, name:p.name, price:p.price, cost:p.cost, qty:1, stock:p.stock}];
    });
  };
  const changeQty = (id, delta) => {
    setCart(c => c.map(i => {
      if (i.id !== id) return i;
      const next = i.qty + delta;
      if (next <= 0) return null;
      if (next > i.stock) return i;
      return {...i, qty:next};
    }).filter(Boolean));
  };
  const removeItem = (id) => setCart(c => c.filter(i=>i.id!==id));

  const total = cart.reduce((a,i)=>a+i.price*i.qty, 0);

  const completeSale = async () => {
    if (cart.length === 0 || busy) return;
    setBusy(true); setErr("");
    const items = cart.map(i => ({product_id: i.id, qty: i.qty}));
    const {error} = await onCompleteSale(items);
    setBusy(false);
    if (error){ setErr(error.message.replace(/^.*: /, "")); return; }
    setCart([]);
    setToast("Sale completed — " + fmt(total));
  };

  const sendMpesaPrompt = async () => {
    const digits = mpesaPhone.replace(/\D/g, "");
    const validLocal = /^0[71]\d{8}$/.test(digits);
    const validIntl = /^254[71]\d{8}$/.test(digits);
    if (!validLocal && !validIntl){
      setMpesaError("Enter a valid Safaricom number, e.g. 07XXXXXXXX");
      return;
    }
    setMpesaError("");
    setBusy(true);
    const {data, error} = await sb.functions.invoke("initiate-stk-push", {
      body: {
        phone: digits,
        amount: total,
        accountRef: storeName,
        description: "POS sale",
        staffToken: user.token,
      },
    });
    setBusy(false);
    if (error){
      // supabase-js hides the Edge Function's actual error message behind a
      // generic "non-2xx status code" unless you read the raw response yourself.
      let msg = "Could not send the M-Pesa prompt. Try again.";
      try {
        const body = await error.context.json();
        if (body?.error) msg = body.error;
      } catch (_) { /* keep the generic fallback message */ }
      setMpesaStage("failed");
      setMpesaError(msg);
      return;
    }
    if (data?.error){
      setMpesaStage("failed");
      setMpesaError(data.error);
      return;
    }
    setCheckoutRequestId(data.checkoutRequestId);
    setMpesaStage("waiting");
  };

  const resetMpesa = () => {
    setMpesaStage("idle");
    setMpesaPhone("");
    setMpesaError("");
    setCheckoutRequestId(null);
  };

  const filtered = products.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));

  return (
    <div className="pos-layout">
      <div>
        <div className="search-bar" style={{maxWidth:320, marginBottom:16}}>
          <Icon name="search" size={15}/>
          <input placeholder="Search products to add…" value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
        {err && <div className="login-error" style={{marginBottom:14}}>{err}</div>}
        <div className="tiles-grid">
          {filtered.map(p => (
            <button key={p.id} className="product-tile" disabled={p.stock===0} onClick={()=>addToCart(p)}>
              <div className="pname">{p.name}</div>
              <div className="pcat">{p.category}</div>
              <div className="prow">
                <span className="pprice">{fmt(p.price)}</span>
                <span className="pstock">{p.stock===0 ? "Out of stock" : p.stock+" left"}</span>
              </div>
            </button>
          ))}
        </div>
      </div>

      <div className="receipt">
        <div className="receipt-head">
          <div className="store disp">{storeName}</div>
          <div className="meta">Cashier: {user.name} · {new Date().toLocaleDateString()}</div>
        </div>
        <div className="receipt-items">
          {cart.length === 0 ? (
            <div className="receipt-empty">Tap a product to add it to the sale.</div>
          ) : cart.map(i => (
            <div className="receipt-line" key={i.id}>
              <div>
                <div className="li-name">{i.name}</div>
                <div className="li-sub">{fmt(i.price)} × {i.qty} = {fmt(i.price*i.qty)}</div>
                <button className="li-remove" onClick={()=>removeItem(i.id)}>Remove</button>
              </div>
              <div className="qty-ctrl">
                <button onClick={()=>changeQty(i.id,-1)}>–</button>
                <span>{i.qty}</span>
                <button onClick={()=>changeQty(i.id,1)} disabled={i.qty>=i.stock}>+</button>
              </div>
            </div>
          ))}
        </div>
        <div className="receipt-totals">
          <div className="row"><span>Items</span><span>{cart.reduce((a,i)=>a+i.qty,0)}</span></div>
          <div className="row grand"><span>Total</span><span>{fmt(total)}</span></div>
        </div>

        <div className="pay-toggle">
          <button
            className={payMethod==="cash" ? "active" : ""}
            onClick={()=>{ setPayMethod("cash"); resetMpesa(); }}
          >Cash</button>
          <button
            className={payMethod==="mpesa" ? "active" : ""}
            onClick={()=>setPayMethod("mpesa")}
          >M-Pesa</button>
        </div>

        {payMethod==="mpesa" && mpesaStage==="phone" && (
          <div className="mpesa-box">
            <label>Buyer's M-Pesa number</label>
            <input placeholder="07XX XXX XXX" value={mpesaPhone} onChange={e=>setMpesaPhone(e.target.value)}/>
            {mpesaError && <div className="login-error" style={{marginBottom:10}}>{mpesaError}</div>}
            <button className="checkout-btn" disabled={busy} onClick={sendMpesaPrompt}>{busy ? "Sending prompt…" : "Send STK push"}</button>
          </div>
        )}

        {payMethod==="mpesa" && mpesaStage==="waiting" && (
          <div className="mpesa-box">
            <div className="mpesa-waiting">
              <div className="mpesa-spinner"></div>
              Waiting for {mpesaPhone} to enter their M-Pesa PIN…
            </div>
            <button className="mpesa-cancel" onClick={resetMpesa}>Cancel</button>
          </div>
        )}

        {payMethod==="mpesa" && mpesaStage==="failed" && (
          <div className="mpesa-box">
            <div className="login-error" style={{marginBottom:10}}>{mpesaError}</div>
            <button className="checkout-btn" onClick={()=>setMpesaStage("phone")}>Try again</button>
          </div>
        )}

        <div className="receipt-foot">
          {payMethod==="cash" ? (
            <button className="checkout-btn" disabled={cart.length===0 || busy} onClick={completeSale}>{busy ? "Completing…" : "Complete sale"}</button>
          ) : (
            mpesaStage==="idle" && (
              <button className="checkout-btn" disabled={cart.length===0 || busy} onClick={()=>setMpesaStage("phone")}>Pay with M-Pesa</button>
            )
          )}
        </div>
      </div>

      {toast && <div className="toast"><Icon name="check" size={15}/>{toast}</div>}
    </div>
  );
}

/* ---------------- REPORTS PAGE ---------------- */
function ReportsPage({sales, user}){
  const isAdmin = user.role === "admin";
  const byDate = {};
  sales.forEach(s => {
    const key = todayKey(s.timestamp);
    if (!byDate[key]) byDate[key] = {date:key, revenue:0, profit:0, count:0};
    byDate[key].revenue += s.total;
    byDate[key].profit += s.profit;
    byDate[key].count += 1;
  });
  const rows = Object.values(byDate).sort((a,b)=> new Date(b.date)-new Date(a.date));
  const chartRows = rows.slice(0,7).reverse();
  const maxVal = Math.max(1, ...chartRows.map(r=>Math.max(r.revenue, isAdmin?r.profit:0)));

  const byWeek = {};
  sales.forEach(s => {
    const start = startOfWeekMonday(s.timestamp);
    const key = start.getTime();
    if (!byWeek[key]){
      const end = new Date(start); end.setDate(end.getDate()+6);
      byWeek[key] = {start, end, revenue:0, profit:0, count:0};
    }
    byWeek[key].revenue += s.total;
    byWeek[key].profit += s.profit;
    byWeek[key].count += 1;
  });
  const weekRows = Object.values(byWeek).sort((a,b)=> b.start - a.start);

  return (
    <div>
      <div className="panel" style={{marginBottom:20}}>
        <div className="panel-head"><h3>Last {chartRows.length || 0} days</h3></div>
        <div className="panel-body">
          {chartRows.length === 0 ? (
            <div className="empty-state"><Icon name="reports" size={30}/><p>No sales history yet.</p></div>
          ) : (
            <>
              <div className="legend">
                <span><span className="dot" style={{background:"var(--green)"}}></span>Revenue</span>
                {isAdmin && <span><span className="dot" style={{background:"var(--gold)"}}></span>Profit</span>}
              </div>
              <div className="bars">
                {chartRows.map(r => (
                  <div className="bar-col" key={r.date}>
                    <div style={{display:"flex", gap:4, alignItems:"flex-end", height:"100%", width:"100%", justifyContent:"center"}}>
                      <div className="bar" style={{height:(r.revenue/maxVal*100)+"%"}} title={fmt(r.revenue)}></div>
                      {isAdmin && <div className="bar is-profit" style={{height:(r.profit/maxVal*100)+"%"}} title={fmt(r.profit)}></div>}
                    </div>
                    <div className="blabel">{new Date(r.date).toLocaleDateString(undefined,{month:"short", day:"numeric"})}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      <div className="panel">
        <div className="panel-head"><h3>Daily breakdown</h3></div>
        {rows.length === 0 ? (
          <div className="empty-state"><Icon name="receipt" size={30}/><p>Sales you record will show up here, grouped by day.</p></div>
        ) : (
          <div className="table-scroll">
          <table>
            <thead>
              <tr><th>Date</th><th>Transactions</th><th>Revenue</th>{isAdmin && <th>Profit</th>}{isAdmin && <th>Margin</th>}</tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.date}>
                  <td>{new Date(r.date).toLocaleDateString(undefined,{weekday:"short", month:"short", day:"numeric"})}</td>
                  <td>{r.count}</td>
                  <td className="num">{fmt(r.revenue)}</td>
                  {isAdmin && <td className="num">{fmt(r.profit)}</td>}
                  {isAdmin && <td className="num">{r.revenue>0 ? Math.round(r.profit/r.revenue*100):0}%</td>}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>

      <div className="panel" style={{marginTop:20}}>
        <div className="panel-head"><h3>Weekly sales (Monday – Sunday)</h3></div>
        {weekRows.length === 0 ? (
          <div className="empty-state"><Icon name="reports" size={30}/><p>Once a week of sales has been recorded, weekly totals will show up here.</p></div>
        ) : (
          <div className="table-scroll">
          <table>
            <thead>
              <tr><th>Week</th><th>Transactions</th><th>Revenue</th>{isAdmin && <th>Profit</th>}{isAdmin && <th>Margin</th>}</tr>
            </thead>
            <tbody>
              {weekRows.map(r => (
                <tr key={r.start.getTime()}>
                  <td>{shortDate(r.start)} – {shortDate(r.end)}</td>
                  <td>{r.count}</td>
                  <td className="num">{fmt(r.revenue)}</td>
                  {isAdmin && <td className="num">{fmt(r.profit)}</td>}
                  {isAdmin && <td className="num">{r.revenue>0 ? Math.round(r.profit/r.revenue*100):0}%</td>}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- SETTINGS PAGE ---------------- */
function SettingsPage({user, staff, storeName, lowStockThreshold, loginLogs, onCreateStaff, onRemoveStaff, onSaveStoreSettings}){
  const isAdmin = user.role === "admin";
  const [newStaff, setNewStaff] = useState({username:"", password:"", name:"", role:"sales"});
  const [msg, setMsg] = useState("");
  const [staffErr, setStaffErr] = useState("");
  const [confirmRemove, setConfirmRemove] = useState(null);
  const [busy, setBusy] = useState(false);

  const [storeForm, setStoreForm] = useState({storeName, lowStockThreshold});
  const [storeMsg, setStoreMsg] = useState("");
  const [storeBusy, setStoreBusy] = useState(false);
  useEffect(()=>{ setStoreForm({storeName, lowStockThreshold}); }, [storeName, lowStockThreshold]);

  const addStaff = async (e) => {
    e.preventDefault();
    if (!newStaff.username || !newStaff.password || !newStaff.name) return;
    setBusy(true); setStaffErr("");
    const {error} = await onCreateStaff(newStaff);
    setBusy(false);
    if (error){ setStaffErr(error.message.replace(/^.*: /, "")); return; }
    setNewStaff({username:"", password:"", name:"", role:"sales"});
    setMsg("Staff account created.");
    setTimeout(()=>setMsg(""), 2500);
  };

  const adminCount = staff.filter(u=>u.role==="admin").length;
  const canRemove = (u) => u.user_id !== user.id && !(u.role==="admin" && adminCount<=1);

  const removeStaff = async (u) => {
    setBusy(true);
    await onRemoveStaff(u.user_id);
    setBusy(false);
    setConfirmRemove(null);
  };

  const saveStoreDetails = async (e) => {
    e.preventDefault();
    setStoreBusy(true); setStoreMsg("");
    const {error} = await onSaveStoreSettings(storeForm.storeName, Number(storeForm.lowStockThreshold)||0);
    setStoreBusy(false);
    if (error){ setStoreMsg(error.message.replace(/^.*: /, "")); return; }
    setStoreMsg("Saved.");
    setTimeout(()=>setStoreMsg(""), 2000);
  };

  if (!isAdmin){
    return (
      <div className="panel" style={{maxWidth:480}}>
        <div className="panel-head"><h3>Your profile</h3></div>
        <div className="panel-body">
          <div className="field-inline"><label>Name</label><input disabled value={user.name}/></div>
          <div className="field-inline"><label>Role</label><input disabled value={"Sales person"}/></div>
          <p style={{fontSize:12, color:"var(--text-muted)"}}>Store settings, pricing and staff accounts are managed by an admin.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="settings-grid">
      <div className="panel">
        <div className="panel-head"><h3>Store details</h3></div>
        <div className="panel-body">
          <form onSubmit={saveStoreDetails}>
            <div className="field-inline">
              <label>Store name</label>
              <input value={storeForm.storeName} onChange={e=>setStoreForm(f=>({...f, storeName:e.target.value}))}/>
            </div>
            <div className="field-inline">
              <label>Low stock alert threshold (units)</label>
              <input type="number" min="0" value={storeForm.lowStockThreshold} onChange={e=>setStoreForm(f=>({...f, lowStockThreshold:e.target.value}))}/>
            </div>
            <p style={{fontSize:12, color:"var(--text-muted)", marginTop:8}}>
              Products at or below this many units will be flagged on the Dashboard and Products page.
            </p>
            {storeMsg && <p style={{fontSize:12, color:"var(--green-dark)", marginTop:4}}>{storeMsg}</p>}
            <button className="btn btn-primary" type="submit" disabled={storeBusy} style={{marginTop:10}}>{storeBusy ? "Saving…" : "Save store details"}</button>
          </form>
        </div>
      </div>

      <div className="panel">
        <div className="panel-head"><h3>Staff accounts</h3></div>
        <div className="panel-body">
          {staff.map(u => (
            <div className="staff-row" key={u.user_id}>
              <div>
                <div className="name">{u.full_name}</div>
                <div className="uname">{u.username} · {u.role}</div>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:8}}>
                <span className={"badge " + u.role}>{u.role}</span>
                <button
                  className="icon-btn"
                  disabled={!canRemove(u) || busy}
                  title={!canRemove(u) ? (u.user_id===user.id ? "You can't remove the account you're logged in as." : "At least one admin account must remain.") : "Remove staff"}
                  onClick={()=>canRemove(u) && setConfirmRemove(u)}
                >
                  <Icon name="trash" size={14}/>
                </button>
              </div>
            </div>
          ))}

          <form onSubmit={addStaff} style={{marginTop:16, paddingTop:16, borderTop:"1px dashed var(--border)"}}>
            <div className="form-row">
              <div className="field-inline">
                <label>Full name</label>
                <input value={newStaff.name} onChange={e=>setNewStaff({...newStaff, name:e.target.value})}/>
              </div>
              <div className="field-inline">
                <label>Role</label>
                <select value={newStaff.role} onChange={e=>setNewStaff({...newStaff, role:e.target.value})}>
                  <option value="sales">Sales person</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="field-inline">
                <label>Username (they'll use this to log in)</label>
                <input value={newStaff.username} onChange={e=>setNewStaff({...newStaff, username:e.target.value})}/>
              </div>
              <div className="field-inline">
                <label>Temporary password</label>
                <input type="password" value={newStaff.password} onChange={e=>setNewStaff({...newStaff, password:e.target.value})}/>
              </div>
            </div>
            {staffErr && <p style={{fontSize:12, color:"var(--red)", marginTop:-4}}>{staffErr}</p>}
            {msg && <p style={{fontSize:12, color:"var(--green-dark)", marginTop:-4}}>{msg}</p>}
            <button className="btn btn-primary" type="submit" disabled={busy} style={{marginTop:6}}><Icon name="plus" size={14}/>{busy ? "Creating…" : "Add staff account"}</button>
          </form>
        </div>
      </div>

      <div className="panel" style={{gridColumn:"1 / -1"}}>
        <div className="panel-head"><h3>Login activity</h3></div>
        <div className="panel-body" style={{padding:0}}>
          {(!loginLogs || loginLogs.length===0) ? (
            <div className="empty-state"><Icon name="reports" size={30}/><p>No logins recorded yet.</p></div>
          ) : (
            <div className="table-scroll">
            <table>
              <thead><tr><th>Staff member</th><th>Role</th><th>Date</th><th>Time</th></tr></thead>
              <tbody>
                {loginLogs.slice().reverse().map((l,i) => (
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{l.full_name}</td>
                    <td><span className={"badge " + l.role}>{l.role}</span></td>
                    <td>{new Date(l.created_at).toLocaleDateString(undefined,{weekday:"short", month:"short", day:"numeric"})}</td>
                    <td className="mono">{new Date(l.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>
          )}
        </div>
      </div>

      {confirmRemove && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) setConfirmRemove(null);}}>
          <div className="modal">
            <h3>Remove staff account?</h3>
            <p className="modal-sub"><b>{confirmRemove.full_name}</b> ({confirmRemove.username}) will no longer be able to log in. This can't be undone.</p>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setConfirmRemove(null)}>Cancel</button>
              <button className="btn" style={{background:"var(--red)", color:"#fff"}} disabled={busy} onClick={()=>removeStaff(confirmRemove)}>
                <Icon name="trash" size={14}/>{busy ? "Removing…" : "Remove"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- APP ---------------- */
function App(){
  // "loading" | "setup" | "login" | "ready" | "config_missing" | "error"
  const [authState, setAuthState] = useState("loading");
  const [authError, setAuthError] = useState("");
  const [currentUser, setCurrentUser] = useState(null); // {token, id, username, name, role}
  const [sessionLoginTime, setSessionLoginTime] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const [products, setProducts] = useState([]);
  const [sales, setSales] = useState([]);
  const [staff, setStaff] = useState([]);
  const [loginLogs, setLoginLogs] = useState([]);
  const [storeName, setStoreName] = useState("My Store");
  const [lowStockThreshold, setLowStockThreshold] = useState(10);

  // ---- boot: restore session or check first-run setup ----
  useEffect(() => {
    if (!sb){ setAuthState("config_missing"); return; }
    (async () => {
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved){
        try {
          const parsed = JSON.parse(saved);
          const {data, error} = await sb.rpc("get_current_user", {p_token: parsed.token});
          if (!error && data && data.length){
            const u = data[0];
            setCurrentUser({token: parsed.token, id:u.user_id, username:u.username, name:u.full_name, role:u.role});
            setSessionLoginTime(parsed.loginTime || Date.now());
            setAuthState("ready");
            return;
          }
        } catch(e){}
        localStorage.removeItem(SESSION_KEY);
      }
      const {data, error} = await sb.rpc("is_setup_complete");
      if (error){ setAuthError(error.message); setAuthState("error"); return; }
      setAuthState(data ? "login" : "setup");
    })();
  }, []);

  // ---- load all app data whenever we become "ready" ----
  useEffect(() => {
    if (authState !== "ready" || !currentUser) return;
    loadAllData();
  }, [authState, currentUser && currentUser.token]);

  async function loadAllData(){
    const token = currentUser.token;
    const [productsRes, salesRes, settingsRes] = await Promise.all([
      sb.rpc("get_products", {p_token: token}),
      sb.rpc("get_sales", {p_token: token}),
      sb.rpc("get_store_settings", {p_token: token}),
    ]);
    if (!productsRes.error) setProducts((productsRes.data||[]).map(mapProductRow));
    if (!salesRes.error) setSales((salesRes.data||[]).map(mapSaleRow));
    if (!settingsRes.error && settingsRes.data && settingsRes.data.length){
      setStoreName(settingsRes.data[0].store_name);
      setLowStockThreshold(settingsRes.data[0].low_stock_threshold);
    }
    if (currentUser.role === "admin"){
      const [staffRes, logsRes] = await Promise.all([
        sb.rpc("list_staff", {p_token: token}),
        sb.rpc("get_login_logs", {p_token: token}),
      ]);
      if (!staffRes.error) setStaff(staffRes.data||[]);
      if (!logsRes.error) setLoginLogs(logsRes.data||[]);
    }
  }

  const finishLogin = (row) => {
    const user = {token: row.token, id: row.user_id, username: row.username, name: row.full_name, role: row.role};
    localStorage.setItem(SESSION_KEY, JSON.stringify({token: row.token, loginTime: Date.now()}));
    setCurrentUser(user);
    setSessionLoginTime(Date.now());
    setPage(user.role === "sales" ? "sales" : "dashboard");
    setAuthState("ready");
  };

  const handleLogout = async () => {
    try {
      if (currentUser) await sb.rpc("logout", {p_token: currentUser.token});
    } catch (e) {
      console.error("Logout RPC failed (continuing to log out locally):", e);
    }
    localStorage.removeItem(SESSION_KEY);
    setCurrentUser(null);
    setProducts([]); setSales([]); setStaff([]); setLoginLogs([]);
    setAuthState("login");
    setSidebarOpen(false);
  };

  const navigateTo = (p) => { setPage(p); setSidebarOpen(false); };

  // ---- mutation handlers passed down to pages ----
  const saveProduct = async (form, id) => {
    const {error} = await sb.rpc("upsert_product", {
      p_token: currentUser.token, p_id: id, p_name: form.name, p_category: form.category,
      p_stock: form.stock, p_price: form.price, p_cost: form.cost,
    });
    if (!error){
      const {data} = await sb.rpc("get_products", {p_token: currentUser.token});
      setProducts((data||[]).map(mapProductRow));
    }
    return {error};
  };

  const deleteProduct = async (id) => {
    const {error} = await sb.rpc("delete_product", {p_token: currentUser.token, p_id: id});
    if (!error) setProducts(ps => ps.filter(p => p.id !== id));
    return {error};
  };

  const completeSale = async (items) => {
    const {error} = await sb.rpc("record_sale", {p_token: currentUser.token, p_items: items});
    if (!error){
      const [productsRes, salesRes] = await Promise.all([
        sb.rpc("get_products", {p_token: currentUser.token}),
        sb.rpc("get_sales", {p_token: currentUser.token}),
      ]);
      if (!productsRes.error) setProducts((productsRes.data||[]).map(mapProductRow));
      if (!salesRes.error) setSales((salesRes.data||[]).map(mapSaleRow));
    }
    return {error};
  };

  const createStaff = async (form) => {
    const {error} = await sb.rpc("create_staff", {
      p_token: currentUser.token, p_username: form.username, p_password: form.password,
      p_full_name: form.name, p_role: form.role,
    });
    if (!error){
      const {data} = await sb.rpc("list_staff", {p_token: currentUser.token});
      setStaff(data||[]);
    }
    return {error};
  };

  const removeStaff = async (userId) => {
    const {error} = await sb.rpc("remove_staff", {p_token: currentUser.token, p_target_user_id: userId});
    if (!error) setStaff(s => s.filter(u => u.user_id !== userId));
    return {error};
  };

  const saveStoreSettings = async (name, threshold) => {
    const {error} = await sb.rpc("update_store_settings", {
      p_token: currentUser.token, p_store_name: name, p_low_stock_threshold: threshold,
    });
    if (!error){ setStoreName(name); setLowStockThreshold(threshold); }
    return {error};
  };

  if (authState === "config_missing") return <ConfigWarning/>;
  if (authState === "loading") return <div className="login-wrap"><div className="login-card"><p className="login-sub" style={{margin:0}}>Loading…</p></div></div>;
  if (authState === "error") return <div className="login-wrap"><div className="login-card"><div className="login-error">{authError || "Something went wrong connecting to the database."}</div></div></div>;
  if (authState === "setup") return <SetupPage onSetupComplete={finishLogin}/>;
  if (authState === "login" || !currentUser) return <LoginPage onLogin={finishLogin}/>;

  // A sales person only ever has access to the till, regardless of stored page state.
  const effectivePage = currentUser.role === "sales" ? "sales" : page;

  let body;
  if (effectivePage === "dashboard") body = <Dashboard products={products} sales={sales} user={currentUser} lowStockThreshold={lowStockThreshold} storeName={storeName}/>;
  else if (effectivePage === "products") body = <ProductsPage products={products} user={currentUser} lowStockThreshold={lowStockThreshold} onSaveProduct={saveProduct} onDeleteProduct={deleteProduct}/>;
  else if (effectivePage === "sales") body = <SalesPage products={products} sales={sales} user={currentUser} storeName={storeName} onCompleteSale={completeSale}/>;
  else if (effectivePage === "reports") body = <ReportsPage sales={sales} user={currentUser}/>;
  else if (effectivePage === "settings") body = <SettingsPage user={currentUser} staff={staff} storeName={storeName} lowStockThreshold={lowStockThreshold} loginLogs={loginLogs} onCreateStaff={createStaff} onRemoveStaff={removeStaff} onSaveStoreSettings={saveStoreSettings}/>;

  return (
    <div className="app">
      <div className={"sidebar-backdrop " + (sidebarOpen ? "open" : "")} onClick={()=>setSidebarOpen(false)}></div>
      <Sidebar page={effectivePage} setPage={navigateTo} user={currentUser} onLogout={handleLogout} loginTime={sessionLoginTime} isOpen={sidebarOpen}/>
      <div className="main">
        <Topbar page={effectivePage} user={currentUser} storeName={storeName} onMenuClick={()=>setSidebarOpen(o=>!o)}/>
        <div className="content">{body}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
